server:
  port: 8080

spring:
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
  data:
    redis:
      host: ${REDIS_HOST}
      password: ${REDIS_PASSWORD}
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:3306}/omagent?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}

logging:
  level:
    com.eastcom.omagent: INFO
    org.springframework.ai: WARN
